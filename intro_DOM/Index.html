<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Comment Box</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1 class="heading">Simple Comment Box</h1>
        <p class="decription">
            Interactúa compartiendo tus pensamientos.
        </p>
    </header>

    <main>
        
        <div class="container">
            <form action="#" class="form" id="form">
                <label for="message" class="form__label">Escribe tu comentario</label>
                <textarea name="message" id="message-box" class="form__textarea" placeholder="Comparte algo interesante..."></textarea>
                <button class="form__btn" id="btn-submit" disabled>Crear comentario</button>
            </form>
        </div>
    </main>


    <section class="message__container">
       
    </section>


    <script src="app.js"></script>
</body>
</html>
